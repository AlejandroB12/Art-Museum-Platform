<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/styles/login-style.css">
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
</head>
<body>
    <div class="login-container">
        <form class="login-form" action="/login-auth" method="POST">
            <h2>Bienvenido</h2>
            <p>Por favor, ingresa tus credenciales</p>
            
            <div id="error-message" class="error-message hidden"></div>

            <div class="input-group">
                <input type="email" id="username" name="username" required>
                <label for="username">Correo Electrónico</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" minlength="6" required>
                <label for="password">Contraseña</label>
            </div>

           <div class="options">
                <a href="/private/password-recovery.html" class="forgot-password">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="login-btn">Iniciar Sesión</button>

            <div class="register-link">
                <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>
            <a href="/public/home.html" class="back-link">← Inicio</a>
        </form>
    </div>
<script>
    document.getElementById('username').addEventListener('invalid', function () {
        this.setCustomValidity('Ingrese un correo electrónico válido.');
    });
    document.getElementById('username').addEventListener('input', function () {
        this.setCustomValidity('');
    });

    document.getElementById('password').addEventListener('invalid', function () {
        if (this.value.length === 0) {
            this.setCustomValidity('La contraseña es obligatoria.');
        } else if (this.value.length < 6) {
            this.setCustomValidity('La contraseña debe tener al menos 6 caracteres.');
        }
    });
    document.getElementById('password').addEventListener('input', function () {
        this.setCustomValidity('');
    });

    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');

    if (error) {
        const msg = document.getElementById('error-message');
        const inputs = document.querySelectorAll('.input-group input');

        inputs.forEach(input => input.classList.add('input-error'));

        if (error === 'credenciales') {
            msg.textContent = 'Credenciales erróneas, vuelva a intentar.';
        } else if (error === 'vencida') {
            msg.textContent = 'Tu membresía ha vencido. Contacta al administrador.';
        } else if (error === 'pago') {
            msg.textContent = 'No se encontró registro de pago.';
        }

        msg.classList.remove('hidden');

        inputs.forEach(input => {
            input.addEventListener('input', () => {
                inputs.forEach(i => i.classList.remove('input-error'));
                msg.classList.add('hidden');
            });
        });
    }
</script>
</body>
</html>
