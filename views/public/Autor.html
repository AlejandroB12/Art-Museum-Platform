<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Autor | MUSEO CONTEMPORANEO</title>
    <link rel="stylesheet" href="/styles/Estilo-inicio.css">
    <style>
        body { padding-top: 100px; background: #050505; color: white; }

        /* --- SECCIÓN PERFIL SUPERIOR --- */
        .author-profile-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            width: 84%;
            margin: 0 auto 40px;
            padding: 40px;
            background: #0a0a0a;
            border: 1px solid #111;
            border-radius: 4px;
        }

        .author-frame {
            flex: 0 0 300px;
            height: 300px;
            border: 1px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            overflow: hidden;
            background: #1a1a1a;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 5%;
            box-sizing: border-box;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-grow: 1;
            gap: 40px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #00ff00;
        }

        .auth-buttons, .user-profile {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .nav-links { gap: 15px; }
            .navbar { padding: 0 2%; }
        }

        .author-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-details { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            text-align: left;
            padding-left: 20px;      
        }

        .author-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .type-tag {
            background: #111;
            color: #00ff00;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 2px;
            border: 1px solid #222;
            text-transform: uppercase;
        }

        .author-details .bio {
            color: #ccc;
            line-height: 1.6;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .badge-nacionalidad {
            display: inline-block;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 5px 15px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* --- SEPARADOR Y TÍTULO --- */
        .separator {
            width: 84%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ff00, transparent);
            margin: 50px auto;
        }

        .section-title {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: #00ff00;
            margin-bottom: 30px;
        }

        .filter-date-container {
            background: #0a0a0a;
            padding: 30px;
            border: 1px solid #111;
            width: 84%;
            margin: 0 auto 50px;
            display: flex;
            justify-content: center;
            border-radius: 4px;
        }

        select {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 10px 12.5px;
            outline: none;
            cursor: pointer;
            font-size: 0.8rem;
        }

        select:hover {
            border-color: #00ff00;
        }

        /* --- ESTILOS DE LA GALERÍA Y TARJETAS --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            padding: 0 8% 100px;
        }

        .art-card {
            background: #0a0a0a;
            border: 1px solid #111;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .art-card:hover {
            transform: translateY(-5px);
            border-color: #00ff00;
        }

        .art-img {
            width: 100%;
            height: 300px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1a1a1a;
            border-bottom: 1px solid #111;
            cursor: zoom-in;
            transition: opacity 0.3s;
        }

        .art-img:hover {
            opacity: 0.9;
        }

        .art-info {
            padding: 20px;
        }

        .art-title {
            font-size: 1.1rem;
            margin: 0 0 5px 0;
            color: white;
            font-weight: 500;
        }

        .price {
            color: #00ff00;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .btn-buy {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 5px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
            border-radius: 2px;
        }

        .btn-buy:hover {
            background: #00ff00;
            color: black;
        }

        @media (max-width: 768px) {
            .author-profile-container { 
                flex-direction: column; 
                text-align: center; 
            }
            .author-meta { 
                justify-content: center; 
            }
            .author-details {
                text-align: center;
                padding-left: 0;
            }
            .gallery-grid {
                grid-template-columns: 1fr;
                padding: 0 5% 50px;
            }
        }

        /* --- ESTILOS DE LA MODAL --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 10000;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .modal-contenido {
            display: flex;
            background: #0a0a0a;
            border: 1px solid #222;
            width: 90%;
            max-width: 1100px;
            height: 80vh;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        #modal-imagen { 
            width: 65%; 
            object-fit: contain; 
            background: #000;
        }

        .modal-info-panel {
            width: 35%;
            padding: 40px;
            overflow-y: auto;
            border-left: 1px solid #222;
        }

        .cerrar-modal {
            position: absolute;
            top: 20px; 
            right: 30px;
            font-size: 2.5rem;
            color: #00ff00;
            cursor: pointer;
            z-index: 10001;
            transition: transform 0.3s;
        }

        .cerrar-modal:hover {
            transform: scale(1.1);
        }

        /* Efecto para desenfocar el fondo */
        body.modal-active #main-wrapper {
            filter: blur(15px);
            pointer-events: none;
            transition: filter 0.4s ease;
        }

        /* Scrollbar personalizada */
        .modal-info-panel::-webkit-scrollbar {
            width: 8px;
        }

        .modal-info-panel::-webkit-scrollbar-track {
            background: #111;
        }

        .modal-info-panel::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="main-wrapper"> 
        <nav class="navbar">
            <a href="/public/Inicio.html" class="logo" style="text-decoration:none; font-weight:bold; letter-spacing:2px; color:white;">ARTE CONTEMPORANEO</a>
            
            <div class="nav-container">
                <ul class="nav-links">
                    <li><a href="Obras.html">Catálogo</a></li>
                    <li><a href="Artistas.html">Artistas</a></li>
                </ul>

                <div class="auth-buttons" id="auth-buttons">
                    <a href="/user/Login.html" class="btn-login" style="color:white; text-decoration:none; font-size:0.75rem;">INICIAR SESION</a>
                    <a href="/user/Login.html" class="btn-register" style="border:1px solid #00ff00; color:#00ff00; padding:8px 15px; text-decoration:none; font-size:0.75rem;">REGISTRARTE</a>
                </div>
            </div>
        </nav>

        <div class="author-profile-container">
            <div class="author-frame">
                <img id="authImg" src="placeholder.jpg" alt="Autor">
            </div>
            <div class="author-details">
                <span id="authNation" class="badge-nacionalidad">Nacionalidad</span>
                <h1 id="authName">Nombre del Autor</h1>
                
                <div class="author-meta">
                    <p id="authBirth" style="color: #666; font-size: 0.8rem; margin: 0;"></p>
                    <div id="authTypes" style="display: flex; gap: 5px;"></div>
                </div>

                <div id="authBio" class="bio">
                    Cargando biografía del artista...
                </div>
            </div>
        </div>

        <div class="separator"></div>

        <h2 class="section-title">Obras</h2>

        <div class="filter-date-container">
            <div class="filter-group">
                <label style="margin-right: 10px; color:#888;">Ordenar por fecha:</label>
                <select id="sortDate">
                    <option value="desc">Más Recientes</option>
                    <option value="asc">Más Antiguas</option>
                </select>
            </div>
        </div>

        <div class="gallery-grid" id="authorGallery"></div>
    </div>

    <div id="obra-modal" class="modal">
        <span class="cerrar-modal" onclick="cerrarModal()">&times;</span>
        <div class="modal-contenido">
            <img id="modal-imagen" src="" alt="Obra expandida">
            <div class="modal-info-panel">
                <h2 id="modal-titulo" style="color:white;"></h2>
                <p id="modal-artista" style="color: #00ff00; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px;"></p>
                <hr style="border-color: #222; margin: 20px 0;">
                <div id="modal-detalles-tecnicos" style="line-height: 1.8; color: #ccc; font-size: 0.9rem;"></div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('obra-modal');

        function abrirModal(img, titulo, artista, detalles) {
            document.getElementById('modal-imagen').src = img;
            document.getElementById('modal-titulo').innerText = titulo;
            document.getElementById('modal-artista').innerText = `Por ${artista}`;
            document.getElementById('modal-detalles-tecnicos').innerHTML = detalles;
            
            modal.style.display = 'flex';
            document.body.classList.add('modal-active');
        }

        function cerrarModal() {
            modal.style.display = 'none';
            document.body.classList.remove('modal-active');
        }

        window.onclick = (event) => { 
            if (event.target == modal) cerrarModal(); 
        }

        const params = new URLSearchParams(window.location.search);
        const idAutor = params.get('id');

        async function cargarPerfil() {
            if (!idAutor) {
                console.error("No se encontró ID de autor en la URL");
                document.getElementById('authorGallery').innerHTML = '<p style="text-align:center; color:red;">Error: No se especificó qué autor mostrar</p>';
                return;
            }

            const ordenDate = document.getElementById('sortDate').value;
            
            try {
                const resp = await fetch(`/api/autor-detalle/${idAutor}?ordenDate=${ordenDate}`);
                
                if (!resp.ok) {
                    throw new Error(`Error HTTP: ${resp.status}`);
                }
                
                const data = await resp.json();

                let nombreAutor = "Artista Desconocido";

                if (data.autor) {
                    nombreAutor = `${data.autor.Nombre || ''} ${data.autor.Apellido || ''}`.trim();
                    document.getElementById('authName').textContent = nombreAutor || "Artista Desconocido";
                    document.getElementById('authNation').textContent = data.autor.NacionalidadDesc || data.autor.Nacionalidad || "Nacionalidad no especificada";
                    
                    if (data.autor.Fecha_nacimiento) {
                        const fecha = new Date(data.autor.Fecha_nacimiento);
                        document.getElementById('authBirth').textContent = `Nacimiento: ${fecha.toLocaleDateString()}`;
                    } else {
                        document.getElementById('authBirth').textContent = "Fecha de nacimiento no disponible";
                    }
                    
                    document.getElementById('authBio').textContent = data.autor.Biografia || "Sin biografía disponible.";
                    
                    if(data.autor.Fotografia) {
                        document.getElementById('authImg').src = `data:image/jpeg;base64,${data.autor.Fotografia}`;
                    } else {
                        document.getElementById('authImg').src = "https://via.placeholder.com/300x300?text=Sin+Imagen";
                    }
                }

                const typesContainer = document.getElementById('authTypes');
                typesContainer.innerHTML = '';
                
                if (data.obras && data.obras.length > 0) {
                    const generosUnicos = [...new Set(data.obras.map(o => o.GeneroNombre).filter(g => g))];
                    
                    generosUnicos.forEach(genero => {
                        const span = document.createElement('span');
                        span.className = 'type-tag';
                        span.textContent = genero;
                        typesContainer.appendChild(span);
                    });

                    const gallery = document.getElementById('authorGallery');
                    gallery.innerHTML = '';
                    
                    data.obras.forEach(obra => {
                        const base64Img = obra.imagen ? obra.imagen : null;
                        const imgPath = base64Img ? `data:image/jpeg;base64,${base64Img}` : 'https://via.placeholder.com/350x300?text=Sin+Imagen';
                        
                        // Preparar ficha técnica para la modal
                        const año = obra.Fecha_creacion ? new Date(obra.Fecha_creacion).getFullYear() : 'N/A';
                        const precio = obra.PrecioFormateado || 'Precio no disponible';
                        
                        // Recopilar detalles técnicos según el tipo de obra
                        let detallesTecnicos = '';
                        if (obra.Tecnica_Principal) detallesTecnicos += `<p><strong>TÉCNICA PRINCIPAL:</strong> ${obra.Tecnica_Principal}</p>`;
                        if (obra.Soporte_Base) detallesTecnicos += `<p><strong>SOPORTE:</strong> ${obra.Soporte_Base}</p>`;
                        if (obra.Material_Predominante) detallesTecnicos += `<p><strong>MATERIAL:</strong> ${obra.Material_Predominante}</p>`;
                        if (obra.Requiere_Pedestal !== undefined) detallesTecnicos += `<p><strong>REQUIERE PEDESTAL:</strong> ${obra.Requiere_Pedestal ? 'Sí' : 'No'}</p>`;
                        if (obra.Formato_Origen) detallesTecnicos += `<p><strong>FORMATO ORIGEN:</strong> ${obra.Formato_Origen}</p>`;
                        if (obra.Metal_Base_Dominante) detallesTecnicos += `<p><strong>METAL BASE:</strong> ${obra.Metal_Base_Dominante}</p>`;
                        if (obra.Kilataje_Estandar) detallesTecnicos += `<p><strong>KILATAJE:</strong> ${obra.Kilataje_Estandar}</p>`;
                        if (obra.Tecnica_Acabado) detallesTecnicos += `<p><strong>ACABADO:</strong> ${obra.Tecnica_Acabado}</p>`;
                        if (obra.Tipo_Arcilla_Base) detallesTecnicos += `<p><strong>ARCILLA:</strong> ${obra.Tipo_Arcilla_Base}</p>`;
                        
                        const fichaTecnica = `
                            <p><strong>GÉNERO:</strong> ${obra.GeneroNombre || 'N/A'}</p>
                            <p><strong>AÑO:</strong> ${año}</p>
                            <p><strong>PRECIO:</strong> ${precio}</p>
                            ${detallesTecnicos || '<p><em>No hay detalles técnicos adicionales</em></p>'}
                        `;

                        const card = document.createElement('div');
                        card.className = 'art-card';
                        card.innerHTML = `
                            <div class="art-img" style="background-image: url('${imgPath}')"></div>
                            <div class="art-info">
                                <h3 class="art-title">${obra.Nombre || 'Sin título'}</h3>
                                <p style="color: #666; font-size: 0.7rem; margin-top: 5px;">Año: ${año}</p>
                                <div class="art-footer" style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                                    <span class="price">${precio}</span>
                                    <button class="btn-buy" data-id="${obra.id_Obra}">Adquirir</button>
                                </div>
                            </div>
                        `;
                        
                        // Agregar evento click a la imagen
                        const imgDiv = card.querySelector('.art-img');
                        imgDiv.addEventListener('click', () => {
                            abrirModal(imgPath, obra.Nombre || 'Sin título', nombreAutor, fichaTecnica);
                        });
                        
                        // Agregar evento click al botón de compra
                        const buyBtn = card.querySelector('.btn-buy');
                        buyBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            comprar(obra.id_Obra, obra.Nombre);
                        });
                        
                        gallery.appendChild(card);
                    });
                } else {
                    document.getElementById('authorGallery').innerHTML = '<p style="text-align:center; width:100%; color:#444; padding: 50px;">Este autor no tiene obras disponibles.</p>';
                }
            } catch (error) {
                console.error("Error cargando perfil:", error);
                document.getElementById('authorGallery').innerHTML = '<p style="text-align:center; width:100%; color:red; padding: 50px;">Error al cargar las obras del autor. Por favor, intenta de nuevo más tarde.</p>';
            }
        }

        function comprar(id, nombre) {
            alert(`Solicitud de adquisición para la obra: ${nombre || 'ID: ' + id}\n\nPróximamente estará disponible el sistema de compras.`);
            // Aquí puedes redirigir a una página de checkout o abrir un modal de compra
            // window.location.href = `/comprar/${id}`;
        }

        // Event listener para el selector de orden
        document.getElementById('sortDate').addEventListener('change', cargarPerfil);
        
        // Cargar el perfil cuando la página esté lista
        document.addEventListener('DOMContentLoaded', () => {
            cargarPerfil();
            
            // Verificar estado de usuario para mostrar/ocultar botones de autenticación
            fetch('/api/estado-usuario')
                .then(response => response.json())
                .then(data => {
                    const authContainer = document.querySelector('.auth-buttons');
                    const navContainer = document.querySelector('.nav-container');
                    
                    if (data.autenticado) {
                        if (authContainer) authContainer.style.display = 'none';
                        
                        fetch('/api/usuario-actual')
                            .then(res => res.json())
                            .then(user => {
                                const userDiv = document.createElement('div');
                                userDiv.className = 'user-profile';
                                userDiv.innerHTML = `
                                    <span style="margin-right: 15px; color:white;">Hola, ${user.nombre || user.email || 'Usuario'}</span>
                                    <a href="/user/Panel-usuario.html" style="margin-right: 15px; color: #00ff00; text-decoration: none; border: 1px solid #00ff00; padding: 5px 10px; font-size: 0.7rem;">PANEL DE USUARIO</a>
                                    <a href="/logout" class="btn-logout" style="color:white; text-decoration:none;">Cerrar Sesión</a>
                                `;
                                if (navContainer) navContainer.appendChild(userDiv);
                            })
                            .catch(err => console.error("Error cargando usuario:", err));
                    }
                })
                .catch(err => console.error("Error verificando autenticación:", err));
        });
    </script>
</body>
</html>
