<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Artistas | MUSEO CONTEMPORANEO</title>
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
    <link rel="stylesheet" href="/styles/Estilo-inicio.css">
    <style>
         
         .btn-panel, .btn-logout {
            text-decoration: none;
            padding: 5px 12px;
            font-size: 0.7rem;
            transition: 0.3s ease;
            letter-spacing: 1px;
            background: transparent;
            display: inline-block;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* --- Variación VERDE (Panel) --- */
        .btn-panel {
            color: #00ff00;
            border: 1px solid #00ff00;
            margin-right: 10px;
        }

        .btn-panel:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 20px #00ff00;
            cursor: pointer;
        }

        /* --- Variación ROJA (Cerrar Sesión) --- */
        .btn-logout {
            color: red;
            border: 1px solid #ff4444; /* Ahora tiene borde igual que el verde */
        }

        .btn-logout:hover {
            background: #ff4444;
            color: Black; /* Texto blanco para mejor lectura sobre rojo */
            box-shadow: 0 0 20px #ff4444;
            cursor: pointer;
        }

        body { padding-top: 100px; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }

        .container { width: 84%; margin: 0 auto; }

        /* --- NAVBAR (Ajustada para consistencia) --- */
        .navbar {
            position: fixed;
            top: 0; width: 100%; height: 80px; 
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(15px); z-index: 9999; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }
        .logo { color: white; text-decoration: none; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { display: flex; list-style: none; gap: 30px; margin: 0; padding: 0; }
        .nav-links a { color: white; text-decoration: none; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #00ff00; }

        /* Asegura que el contenedor de navegación gestione bien el espacio */
        .nav-container {
            display: flex;
            align-items: center;
            gap: 40px; /* Aumentamos el espacio entre grupos */
        }

        /* Estilo para el contenedor del usuario */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 20px; /* Espacio entre el saludo, el botón y el logout */
            white-space: nowrap; /* Evita que los elementos se salten a la siguiente línea */
        }

        /* --- CABECERA SECCIÓN --- */
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h1 { text-transform: uppercase; letter-spacing: 15px; font-size: 2.5rem; color: #fff; margin-bottom: 10px; }
        .section-header p { color: #00ff00; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; }

        /* --- GRILLA DE ARTISTAS --- */
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding-bottom: 100px;
        }

        .artist-card {
            background: #0a0a0a;
            border: 1px solid #111;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .artist-card:hover {
            border-color: #00ff00;
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.05);
        }

        .artist-photo-frame {
            width: 160px; height: 160px;
            margin: 0 auto 25px;
            border: 1px solid #222;
            padding: 5px;
            border-radius: 50%;
            transition: 0.4s;
        }

        .artist-card:hover .artist-photo-frame { border-color: #00ff00; }

        .artist-photo-frame img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
            filter: grayscale(100%);
            transition: 0.4s;
        }

        .artist-card:hover img { filter: grayscale(0%); }

        .artist-name { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: #fff; }

        .artist-specialty { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        
        .tag {
            font-size: 0.6rem;
            background: #111;
            color: #00ff00;
            padding: 4px 10px;
            border: 1px solid #222;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .artist-info {
            font-size: 0.7rem;
            color: #555;
            border-top: 1px solid #111;
            padding-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

   <nav class="navbar">
        <a href="/public/Inicio.html" class="logo" style="text-decoration:none; font-weight:bold; letter-spacing:2px;"> ARTE CONTEMPORANEO</a>
        
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="Obras.html">Catálogo</a></li>
                <li><a href="Artistas.html">Artistas</a></li>
                
            </ul>

            <div class="auth-buttons" id="auth-buttons">
                <a href="/user/Login.html" class="btn-login" style="color:white; text-decoration:none; font-size:0.75rem;">INICIAR SESION</a>
                <a href="/user/Registro.html" class="btn-register" style="border:1px solid #00ff00; color:#00ff00; padding:8px 15px; text-decoration:none; font-size:0.75rem;">REGISTRARTE</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="section-header">
            <h1>Artistas</h1>
            <p>Mentes detrás de la colección</p>
        </header>

        <div class="artists-grid" id="artistsList">
            </div>
    </div>

<script>
    // Asegurar que el DOM esté completamente cargado
    document.addEventListener('DOMContentLoaded', async function() {
        await cargarArtistas();
    });
    
    async function cargarArtistas() {
        try {
            console.log("=== INICIANDO CARGA DE ARTISTAS ===");
            
            // Esperar un momento para asegurar que todo esté listo
            await new Promise(resolve => setTimeout(resolve, 100));
            
            const resp = await fetch('/api/artistas-catalogo');
            
            console.log("Status de respuesta:", resp.status);
            console.log("Respuesta ok?", resp.ok);
            
            if (!resp.ok) {
                const errorText = await resp.text();
                console.error("Error response:", errorText);
                throw new Error(`Error ${resp.status}: ${errorText}`);
            }
            
            const artistas = await resp.json();
            console.log("Datos recibidos del backend:", artistas);
            console.log("Tipo de datos:", typeof artistas);
            console.log("¿Es array?", Array.isArray(artistas));
            console.log("Cantidad de artistas:", artistas ? artistas.length : 0);
            
            const container = document.getElementById('artistsList');
            console.log("Contenedor encontrado:", container);
            
            if (!container) {
                console.error("❌ No se encontró el elemento con id 'artistsList'");
                return;
            }
            
            // Limpiar el contenedor
            container.innerHTML = '';
            
            if (!artistas || artistas.length === 0) {
                console.warn("No hay artistas para mostrar");
                container.innerHTML = '<p style="text-align:center; color:#00ff00;">No hay artistas disponibles en este momento.</p>';
                return;
            }
            
            console.log(`🎨 Mostrando ${artistas.length} artistas`);
            
            // Crear las tarjetas
            artistas.forEach((autor, index) => {
                console.log(`Procesando artista ${index + 1}: ${autor.Nombre} ${autor.Apellido}`);
                
                // Verificar datos del artista
                if (!autor.Nombre || !autor.Apellido) {
                    console.warn(`Artista ${index} tiene datos incompletos:`, autor);
                    return;
                }
                
                const imgSrc = autor.Fotografia || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22%3E%3Crect fill=%22%231a1a1a%22 width=%22160%22 height=%22160%22/%3E%3Ctext fill=%22%23666%22 font-size=%2212%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3ESin%20Imagen%3C/text%3E%3C/svg%3E';
                
                const fechaNac = autor.Fecha_nacimiento 
                    ? new Date(autor.Fecha_nacimiento).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' })
                    : 'Fecha no disponible';
                
                // Procesar especialidades
                let especialidadesHtml = '';
                if (autor.Especialidades && autor.Especialidades !== 'Sin especialidades' && autor.Especialidades !== 'NULL') {
                    const especialidades = autor.Especialidades.split(',');
                    especialidadesHtml = especialidades.map(esp => `<span class="tag">${esp.trim()}</span>`).join('');
                } else {
                    especialidadesHtml = '<span class="tag">Varias disciplinas</span>';
                }
                
                const card = document.createElement('div');
                card.className = 'artist-card';
                card.onclick = () => {
                    console.log(`Abriendo perfil de: ${autor.Nombre} ${autor.Apellido} (ID: ${autor.id_Autor})`);
                    window.location.href = `Autor.html?id=${autor.id_Autor}`;
                };
                
                card.innerHTML = `
                    <div class="artist-photo-frame">
                        <img src="${imgSrc}" 
                             alt="${autor.Nombre} ${autor.Apellido}" 
                             onerror="console.log('Error cargando imagen para ${autor.Nombre}'); this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22%3E%3Crect fill=%22%231a1a1a%22 width=%22160%22 height=%22160%22/%3E%3Ctext fill=%22%23666%22 font-size=%2212%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3ESin%20Imagen%3C/text%3E%3C/svg%3E'">
                    </div>
                    <h3 class="artist-name">${autor.Nombre} ${autor.Apellido}</h3>
                    <div class="artist-specialty">
                        ${especialidadesHtml}
                    </div>
                    <div class="artist-info">
                        <span>📅 ${fechaNac}</span>
                    </div>
                `;
                
                container.appendChild(card);
            });
            
            console.log(`✅ Carga completada. Total tarjetas: ${container.children.length}`);
            
        } catch (error) {
            console.error("❌ Error detallado:", error);
            console.error("Stack trace:", error.stack);
            
            const container = document.getElementById('artistsList');
            if (container) {
                container.innerHTML = `
                    <div style="text-align:center; width:100%; padding: 40px;">
                        <p style="color:#ff4444;">⚠️ Error al cargar los artistas</p>
                        <p style="color:#666; font-size:0.8rem;">${error.message}</p>
                        <button onclick="location.reload()" style="margin-top:20px; background:#00ff00; color:#000; border:none; padding:10px 20px; cursor:pointer;">
                            Reintentar
                        </button>
                    </div>
                `;
            }
        }
    }
    
    // Cargar información del usuario
    document.addEventListener('DOMContentLoaded', () => {
        fetch('/api/estado-usuario')
            .then(response => response.json())
            .then(data => {
                const authContainer = document.querySelector('.auth-buttons');
                const navContainer = document.querySelector('.nav-container');
                
                if (data.autenticado) {
                    authContainer.style.display = 'none';

                    fetch('/api/usuario-actual')
                        .then(res => res.json())
                        .then(user => {
                            const userDiv = document.createElement('div');
                            userDiv.className = 'user-profile';
                            userDiv.innerHTML = `
                                <span style="margin-right: 15px; color: #eee; font-size: 0.75rem;">HOLA, ${user.nombre}</span>
                                <a href="/user/Panel-usuario.html" class="btn-panel">Panel de control</a>
                                <a href="/logout" class="btn-logout" style="text-decoration: none; font-size: 0.7rem; margin-left: 10px;">Cerrar sesión</a>
                            `;
                            navContainer.appendChild(userDiv);
                        });
                }
            })
            .catch(error => console.error("Error al cargar usuario:", error));
    });
</script>
</body>
</html>
