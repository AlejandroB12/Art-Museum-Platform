<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
    <link rel="stylesheet" href="/styles/password-recovery-style.css">
</head>
<body>
    <div class="login-container">
        <!-- FORM VIEW -->
        <div id="formView" class="form-view">
            <form class="login-form" action="/recuperar-pw" method="POST">
                <h2>Recuperar Contraseña</h2>
                <p class="instruction-text">Ingresa tu correo electrónico y te enviaremos tu contraseña actual.</p>

                <div class="input-group">
                    <input type="email" id="correo" name="correo" required>
                    <label for="correo">Correo Electrónico</label>
                </div>

                <button type="submit" class="login-btn">Enviar Contraseña</button>

                <div class="register-link">
                    <a href="/public/login.html" class="back-link">← Volver al Login</a>
                </div>
            </form>
        </div>

        <!-- SUCCESS VIEW -->
        <div id="successView" class="success-view">
            <div class="login-form">
                <h2>¡Listo!</h2>
                <p>Hemos enviado un enlace de recuperación a tu correo electrónico.</p>
                <p>Por favor, revisa tu bandeja de entrada (y la carpeta de spam).</p>

                <div class="register-link">
                    <a href="/" class="login-btn home-link">Volver al Inicio</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('success') === '1') {
            document.getElementById('formView').style.display = 'none';
            document.getElementById('successView').style.display = 'block';
        }
    </script>
</body>
</html>
