<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envío Registrado | Museo</title>
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #121212; padding: 20px; color: white; }
        .register-container { background: #1e1e1e; padding: 50px 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; width: 100%; max-width: 520px; text-align: center; }
        .check-icon { font-size: 64px; margin-bottom: 16px; }
        h2 { color: #00ff00; font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        p.sub { color: #888; font-size: 15px; margin-bottom: 30px; }
        .order-summary { background: #252525; border-left: 4px solid #00ff00; padding: 20px; border-radius: 8px; margin-bottom: 30px; text-align: left; }
        .order-summary p { margin: 8px 0; color: #ccc; font-size: 0.95rem; text-align: left; }
        .order-summary strong { color: #00ff00; }
        .back-link { display: inline-block; margin-top: 20px; padding: 12px 32px; background: #00ff00; border: none; border-radius: 5px; color: #121212; font-size: 16px; font-weight: 700; cursor: pointer; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
        .back-link:hover { background: #00cc00; transform: translateY(-2px); box-shadow: 0 0 20px rgba(0,255,0,0.3); }
        .loading { color: #00ff00; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="check-icon">✅</div>
        <h2>ENVIO REGISTRADO</h2>
        <p class="sub">El envío de la obra ha sido registrado exitosamente</p>
        <div class="order-summary" id="facturaSummary">
            <p><strong>#Factura:</strong> <span id="facturaNumero">Cargando...</span></p>
            <p><strong>Cliente:</strong> <span id="clienteNombre">Cargando...</span></p>
            <p><strong>Destino:</strong> <span id="destino">Cargando...</span></p>
            <p><strong>Dirección:</strong> <span id="direccion">Cargando...</span></p>
            <p><strong>Número de guía:</strong> <span id="numeroGuia">N/A</span></p>
        </div>
        <a href="/admin/Panel-adminsitrador.html" class="back-link">← Volver al panel</a>
        <div class="loading" id="loading">Redirigiendo al panel...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idFactura = urlParams.get('id_factura');
        const guiaUrl = urlParams.get('numero_guia');

        if (idFactura) {
            document.addEventListener('DOMContentLoaded', async () => {
                if (guiaUrl) {
                    document.getElementById('numeroGuia').textContent = guiaUrl;
                }
                try {
                    const res = await fetch(`/api/factura/${idFactura}`);
                    const data = await res.json();
                    if (data.success && data.factura) {
                        const f = data.factura;
                        document.getElementById('facturaNumero').textContent = f.id_factura.toString().padStart(8, '0');
                        document.getElementById('clienteNombre').textContent = f.CompradorNombre || `${f.Nombre || ''} ${f.Apellido || ''}`.trim() || 'No disponible';
                        if (data.direccion) {
                            document.getElementById('destino').textContent = `${data.direccion.municipio || ''}, ${data.direccion.parroquia || ''}`.replace(/^, /, '').replace(/, $/, '') || 'No especificado';
                            document.getElementById('direccion').textContent = data.direccion.direccion || 'No especificada';
                        }
                        if (data.numero_guia) {
                            document.getElementById('numeroGuia').textContent = data.numero_guia;
                        }
                    }
                } catch (e) {
                    console.error(e);
                }
            });
        }

        setTimeout(() => {
            document.getElementById('loading').style.display = 'block';
            window.location.href = '/admin/Panel-adminsitrador.html';
        }, 5000);
    </script>
</body>
</html>
